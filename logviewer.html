<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>orchclaude log viewer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 13px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    flex-shrink: 0;
  }
  h1 { font-size: 16px; color: #58a6ff; font-weight: bold; letter-spacing: 0.5px; }
  .live-row { display: flex; align-items: center; gap: 10px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #3fb950; animation: pulse 2s infinite; flex-shrink: 0; }
  .dot.dead { background: #484f58; animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  #last-refresh { font-size: 11px; color: #484f58; }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    background: #161b22;
    border-bottom: 1px solid #21262d;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  select {
    background: #21262d;
    color: #c9d1d9;
    border: 1px solid #30363d;
    border-radius: 4px;
    padding: 5px 8px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    min-width: 200px;
  }
  select:focus { outline: none; border-color: #58a6ff; }
  .sep { color: #30363d; font-size: 18px; user-select: none; }
  .filter-group { display: flex; gap: 4px; }
  .filter-btn {
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid #30363d;
    background: #21262d;
    color: #8b949e;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: #58a6ff; color: #c9d1d9; }
  .filter-btn.active { background: #1f6feb; border-color: #388bfd; color: #cae8ff; }
  .filter-btn.fp.active { background: #1a7f37; border-color: #2ea043; color: #aff5b4; }
  .filter-btn.fq.active { background: #9e6a03; border-color: #d29922; color: #f8e3a1; }
  .filter-btn.fe.active { background: #b91c1c; border-color: #da3633; color: #ffdcd7; }
  .filter-btn.fi.active { background: #0e4429; border-color: #196c2e; color: #56d364; }

  #search-input {
    flex: 1;
    min-width: 140px;
    max-width: 300px;
    background: #21262d;
    color: #c9d1d9;
    border: 1px solid #30363d;
    border-radius: 4px;
    padding: 5px 8px;
    font-family: inherit;
    font-size: 12px;
  }
  #search-input:focus { outline: none; border-color: #58a6ff; }
  #search-input::placeholder { color: #484f58; }

  .stats { font-size: 11px; color: #484f58; white-space: nowrap; margin-left: auto; }
  .stats span { color: #8b949e; }

  .autoscroll-label {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: #8b949e;
    cursor: pointer;
    white-space: nowrap;
  }
  .autoscroll-label input { cursor: pointer; accent-color: #58a6ff; }

  #log-container {
    flex: 1;
    overflow-y: auto;
    padding: 12px 20px;
    line-height: 1.7;
  }

  .log-line {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 1px 0;
    border-radius: 2px;
  }
  .log-line.hidden { display: none; }
  .log-line:hover { background: rgba(255,255,255,0.03); }
  .ln {
    color: #30363d;
    font-size: 11px;
    min-width: 42px;
    text-align: right;
    user-select: none;
    flex-shrink: 0;
  }
  .lt { flex: 1; white-space: pre-wrap; word-break: break-all; }

  /* line type colors */
  .lp .lt { color: #3fb950; }
  .lq .lt { color: #e3b341; }
  .le .lt { color: #f85149; }
  .lb .lt { color: #58a6ff; }
  .ld .lt { color: #6e7681; }
  .lc .lt { color: #56d364; }

  /* search highlight */
  mark { background: #ffd33d33; color: #ffd33d; border-radius: 2px; }

  .empty-msg {
    text-align: center;
    padding: 60px 20px;
    color: #484f58;
  }
  .empty-msg h2 { color: #58a6ff; font-size: 18px; margin-bottom: 10px; }
  .empty-msg code { background: #21262d; padding: 2px 6px; border-radius: 4px; color: #e6edf3; }

  footer {
    text-align: center;
    color: #30363d;
    font-size: 11px;
    padding: 8px 20px;
    border-top: 1px solid #21262d;
    flex-shrink: 0;
  }

  @media (max-width: 600px) {
    .toolbar { flex-direction: column; align-items: stretch; }
    #search-input { max-width: 100%; }
  }
</style>
</head>
<body>

<header>
  <h1>&#x1F4DC; orchclaude log viewer</h1>
  <div class="live-row">
    <div class="dot" id="live-dot"></div>
    <span id="last-refresh"></span>
  </div>
</header>

<div class="toolbar">
  <select id="file-select" title="Select log file">
    <option value="">Loading log files&hellip;</option>
  </select>

  <span class="sep">|</span>

  <div class="filter-group" id="filter-group">
    <button class="filter-btn active" data-type="all"   title="Show all lines">ALL</button>
    <button class="filter-btn fp"     data-type="p"     title="PROGRESS lines">PROGRESS</button>
    <button class="filter-btn fq"     data-type="q"     title="QA findings">QA</button>
    <button class="filter-btn fe"     data-type="e"     title="Errors">ERRORS</button>
    <button class="filter-btn fb"     data-type="b"     title="Phase banners">INFO</button>
  </div>

  <span class="sep">|</span>

  <input id="search-input" type="text" placeholder="Search&hellip;" spellcheck="false">

  <label class="autoscroll-label" title="Automatically scroll to the bottom on each refresh">
    <input type="checkbox" id="autoscroll-cb" checked>
    Auto-scroll
  </label>

  <div class="stats">Lines: <span id="stat-visible">0</span> / <span id="stat-total">0</span></div>
</div>

<div id="log-container">
  <div class="empty-msg"><h2>Loading&hellip;</h2><p>Fetching log file</p></div>
</div>

<footer>orchclaude log viewer &mdash; refreshes every 3s &mdash; stop server with Ctrl+C in terminal</footer>

<script>
// ---- state ----
let rawLines     = [];
let activeFilter = 'all';
let searchTerm   = '';
let autoScroll   = true;
let currentFile  = '';

// ---- classify lines ----
function classify(line) {
  if (/PROGRESS:/i.test(line))                                    return 'p';
  if (/QA_FINDING:|QA_SUMMARY:|QA_PASS:/i.test(line))            return 'q';
  if (/\b(ERROR|CIRCUIT BREAKER|TIMEOUT|FAILED|Exception)\b/i.test(line)) return 'e';
  if (/={3,}|PHASE|PLANNING|MERGE|ALL DONE|PARALLEL|CHECKPOINT|CONTEXT GUARD|ESCALAT/i.test(line)) return 'b';
  if (/ORCHESTRATION_COMPLETE|TEST PASSED|QA.*pass/i.test(line)) return 'c';
  return 'd';
}

function cssClass(type) {
  return { p:'lp', q:'lq', e:'le', b:'lb', d:'ld', c:'lc' }[type] || 'ld';
}

// ---- escape ----
function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ---- highlight search term ----
function highlight(text, term) {
  if (!term) return esc(text);
  const safeT = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return esc(text).replace(new RegExp(safeT.replace(/&amp;|&lt;|&gt;/g, s => '\\'+s), 'gi'),
    m => `<mark>${m}</mark>`);
}

// ---- render log ----
function renderLog() {
  const container = document.getElementById('log-container');

  if (rawLines.length === 0) {
    container.innerHTML = '<div class="empty-msg"><h2>No log data</h2>' +
      '<p>Start a run: <code>orchclaude run "your task" -t 30m</code></p></div>';
    document.getElementById('stat-visible').textContent = '0';
    document.getElementById('stat-total').textContent   = '0';
    return;
  }

  let visible = 0;
  const frag  = document.createDocumentFragment();

  rawLines.forEach((line, i) => {
    const type   = classify(line);
    const show   = matchesFilter(type) && matchesSearch(line);
    const div    = document.createElement('div');
    div.className = 'log-line ' + cssClass(type) + (show ? '' : ' hidden');
    div.dataset.type = type;
    div.innerHTML = `<span class="ln">${i+1}</span><span class="lt">${highlight(line, searchTerm)}</span>`;
    frag.appendChild(div);
    if (show) visible++;
  });

  container.innerHTML = '';
  container.appendChild(frag);

  document.getElementById('stat-visible').textContent = visible;
  document.getElementById('stat-total').textContent   = rawLines.length;

  if (autoScroll) container.scrollTop = container.scrollHeight;
}

function matchesFilter(type) {
  if (activeFilter === 'all') return true;
  return type === activeFilter;
}

function matchesSearch(line) {
  if (!searchTerm) return true;
  return line.toLowerCase().includes(searchTerm.toLowerCase());
}

// ---- apply filter/search without full re-render ----
function applyFilterSearch() {
  let visible = 0;
  document.querySelectorAll('.log-line').forEach(div => {
    const type = div.dataset.type;
    const text = div.querySelector('.lt').textContent;
    const show = matchesFilter(type) && matchesSearch(text);
    div.classList.toggle('hidden', !show);

    // update highlights
    if (show) {
      div.querySelector('.lt').innerHTML = highlight(text, searchTerm);
      visible++;
    }
  });
  document.getElementById('stat-visible').textContent = visible;
  if (autoScroll) document.getElementById('log-container').scrollTop = document.getElementById('log-container').scrollHeight;
}

// ---- fetch log files list ----
async function fetchFileList() {
  try {
    const r = await fetch('/api/logs');
    if (!r.ok) throw new Error();
    const files = await r.json();
    const sel   = document.getElementById('file-select');
    const prev  = currentFile;
    sel.innerHTML = '';
    if (!files || files.length === 0) {
      sel.innerHTML = '<option value="">No log files found</option>';
      return;
    }
    files.forEach(f => {
      const opt      = document.createElement('option');
      opt.value      = f;
      opt.textContent = f;
      if (f === prev) opt.selected = true;
      sel.appendChild(opt);
    });
    if (!prev || !files.includes(prev)) {
      currentFile = files[0];
      sel.value   = currentFile;
    }
  } catch {
    // keep current options
  }
}

// ---- fetch log content ----
async function fetchLog() {
  if (!currentFile) return;
  try {
    const r = await fetch('/api/log?file=' + encodeURIComponent(currentFile));
    if (!r.ok) throw new Error();
    const text  = await r.text();
    const lines = text.split('\n');
    // trim trailing empty
    while (lines.length && lines[lines.length-1].trim() === '') lines.pop();
    rawLines = lines;
    renderLog();

    document.getElementById('live-dot').className = 'dot';
    document.getElementById('last-refresh').textContent = 'refreshed ' + new Date().toLocaleTimeString();
  } catch {
    document.getElementById('live-dot').className = 'dot dead';
    document.getElementById('last-refresh').textContent = 'disconnected';
  }
}

// ---- full refresh cycle ----
async function refresh() {
  await fetchFileList();
  await fetchLog();
}

// ---- event listeners ----
document.getElementById('file-select').addEventListener('change', function() {
  currentFile = this.value;
  rawLines    = [];
  fetchLog();
});

document.getElementById('filter-group').addEventListener('click', function(e) {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  activeFilter = btn.dataset.type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilterSearch();
});

let searchTimer;
document.getElementById('search-input').addEventListener('input', function() {
  clearTimeout(searchTimer);
  const val = this.value;
  searchTimer = setTimeout(() => {
    searchTerm = val;
    applyFilterSearch();
  }, 200);
});

document.getElementById('autoscroll-cb').addEventListener('change', function() {
  autoScroll = this.checked;
  if (autoScroll) document.getElementById('log-container').scrollTop = document.getElementById('log-container').scrollHeight;
});

// ---- init ----
refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
